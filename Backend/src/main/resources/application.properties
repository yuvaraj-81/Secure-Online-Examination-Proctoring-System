spring.application.name=online-exam-platform

# ================= DATABASE (Supabase PostgreSQL - Session Pooler) =================

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Let Hibernate auto-detect dialect (no need to force it)
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ================= HIKARI CONNECTION POOL (Free Tier Optimized) =================

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.connection-timeout=30000

# ================= SERVER PORT (Render Dynamic Port) =================

server.port=${PORT:8080}

# ================= SECURITY =================

spring.security.filter.dispatcher-types=REQUEST
jwt.secret=${JWT_SECRET}
frontend.url=${FRONTEND_URL}
